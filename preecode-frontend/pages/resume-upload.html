<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ff6b00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Preecode – Resume Upload</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/tailwind-config.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/mobile-enhancements.js" defer></script>
  <style>
    .drop-zone { border:2px dashed var(--th-border); border-radius:12px; padding:40px 20px; text-align:center; cursor:pointer; transition:border-color .2s, background .2s; }
    .drop-zone:hover, .drop-zone.drag-over { border-color:var(--accent,#6366f1); background:rgba(99,102,241,.05); }
    .drop-zone input[type=file] { display:none; }
    @media (max-width: 767px) {
      .drop-zone { padding: 24px 16px; }
    }
    @media (max-width: 480px) {
      .drop-zone { padding: 20px 12px; }
    }
  </style>
</head>
<body class="bg-th-bg text-txt font-sans min-h-screen text-sm antialiased">

  <div class="app-shell min-h-screen relative z-10">
    <div class="app-main flex-1 flex flex-col">
      <div class="page-content flex-1 p-4 md:p-7 max-w-[1200px] w-full mx-auto opacity-0 animate-fade-in">

        <div class="mb-6">
          <h1 class="text-xl font-semibold text-txt">Resume Analysis</h1>
          <p class="text-txt-muted mt-1">Upload your resume and get an AI-powered ATS score and role match analysis.</p>
        </div>

        <div class="dash-v4-card max-w-lg mx-auto">
          <div class="dash-v4-card__header">
            <span class="dash-v4-card__title">Upload Resume</span>
          </div>

          <!-- Error banner -->
          <div id="errorBanner" class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>

          <form id="uploadForm" class="flex flex-col gap-4 mt-2">

            <!-- Drop zone -->
            <div class="drop-zone" id="dropZone">
              <input type="file" id="fileInput" accept=".pdf,.docx,.txt" />
              <svg class="w-10 h-10 mx-auto text-txt-muted mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
              </svg>
              <p class="text-txt font-medium">Drop your resume here or <span class="text-accent underline cursor-pointer" id="browseLink">click to browse</span></p>
              <p class="text-xs text-txt-muted mt-1">PDF, DOCX, or TXT - max 5 MB</p>
              <p class="text-sm text-accent font-medium mt-3 hidden" id="fileName"></p>
            </div>

            <!-- Target role -->
            <div>
              <label class="block text-xs font-medium text-txt-muted mb-1.5">Target Role</label>
              <select id="targetRole" class="w-full bg-th-surface border border-th-border rounded-lg px-3 py-2.5 text-txt text-sm focus:outline-none focus:ring-2 focus:ring-accent/50">
                <option value="">- Choose a role -</option>
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Full Stack Developer">Full Stack Developer</option>
                <option value="SDE">SDE</option>
                <option value="AI/ML Engineer">AI/ML Engineer</option>
              </select>
            </div>

            <!-- Submit -->
            <button type="submit" id="analyzeBtn" class="dash-v4-practice__cta flex items-center justify-center gap-2">
              <span id="analyzeBtnText">Analyze Resume</span>
              <svg id="analyzeSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
              </svg>
            </button>

          </form>
        </div>

      </div>
    </div>
  </div>

  <script src="/api.js"></script>
  <script src="/layout/layout.js"></script>
  <script src="/layout/chatbot.js"></script>
  <script src="/layout/early-access.js"></script>
  <script>
  (function () {
    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const browseLink = document.getElementById('browseLink');
    const fileNameEl = document.getElementById('fileName');
    let selectedFile = null;

    browseLink.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('click', (e) => { if (e.target !== browseLink) fileInput.click(); });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    function setFile(file) {
      if (file.size > 5 * 1024 * 1024) { showError('File exceeds 5 MB limit.'); return; }
      selectedFile = file;
      fileNameEl.textContent = '📄 ' + file.name;
      fileNameEl.classList.remove('hidden');
    }

    document.getElementById('uploadForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const targetRole = document.getElementById('targetRole').value;
      const errorBanner = document.getElementById('errorBanner');
      const analyzeBtn  = document.getElementById('analyzeBtn');
      const analyzeBtnText = document.getElementById('analyzeBtnText');
      const analyzeSpinner = document.getElementById('analyzeSpinner');

      errorBanner.classList.add('hidden');

      if (!selectedFile) { showError('Please select a resume file.'); return; }
      if (!targetRole)   { showError('Please select a target role.'); return; }

      analyzeBtn.disabled = true;
      analyzeBtnText.textContent = 'Analyzing with AI…';
      analyzeSpinner.classList.remove('hidden');

      try {
        const token  = localStorage.getItem('token');
        const userId = localStorage.getItem('preecode_uid');

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('userId', userId);
        formData.append('targetRole', targetRole);

        const res = await fetch(API_BASE + '/v2/resume/upload', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token },
          body: formData,
        });

        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Upload failed.'); return; }

        window.location.href = '/pages/resume-analysis.html?id=' + data.resumeId;
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtnText.textContent = 'Analyze Resume';
        analyzeSpinner.classList.add('hidden');
      }
    });

    function showError(msg) {
      const b = document.getElementById('errorBanner');
      b.textContent = msg;
      b.classList.remove('hidden');
    }
  })();
  </script>
</body>
</html>
