<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ff6b00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Preecode – Sign In</title>
  <script src="theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <script src="mobile-enhancements.js" defer></script>
  <style>
    /* ── Tokens ── */
    :root {
      --bg:       #ffffff;
      --surface:  #f5f5f7;
      --border:   #d1d1d6;
      --text:     #1d1d1f;
      --sub:      #6e6e73;
      --placeholder: #aeaeb2;
      --orb1: rgba(249,115,22,0.12);
      --orb2: rgba(249,115,22,0.07);
      --overlay-bg: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #000000;
        --surface:  #1c1c1e;
        --border:   #2c2c2e;
        --text:     #f5f5f7;
        --sub:      #636366;
        --placeholder: #48484a;
        --orb1: rgba(249,115,22,0.10);
        --orb2: rgba(249,115,22,0.05);
        --overlay-bg: #000000;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background orbs ── */
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.9;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: var(--orb1);
      top: -120px; left: -140px;
      animation: drift1 18s ease-in-out infinite;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: var(--orb2);
      bottom: -100px; right: -100px;
      animation: drift2 22s ease-in-out infinite;
    }
    .orb-3 {
      width: 260px; height: 260px;
      background: var(--orb1);
      top: 50%; left: 60%;
      animation: drift3 26s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(60px, 80px) scale(1.08); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-50px,-60px) scale(1.06); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-40px, 50px) scale(1.1); }
    }

    /* ── Logo bar ── */
    .logo-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 28px;
      z-index: 10;
    }
    .logo-link { text-decoration: none; display: inline-flex; align-items: center; }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
    .logo-pree { color: var(--text); }
    .logo-code { color: #f97316; }

    /* ── Page layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px 40px;
    }

    /* ── Card ── */
    .card { width: 100%; max-width: 380px; }

    .card-heading { font-size: 26px; font-weight: 700; text-align: center; letter-spacing: -0.3px; margin-bottom: 6px; }
    .card-sub { text-align: center; color: var(--sub); font-size: 14px; margin-bottom: 32px; }

    /* ── Fields ── */
    .auth-field {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .auth-field::placeholder { color: var(--placeholder); }
    .auth-field:focus { border-color: #f97316; }
    .auth-field-pw { padding-right: 44px; }

    .field-wrap { margin-bottom: 12px; }
    .field-wrap-pw { margin-bottom: 6px; position: relative; }

    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--sub); padding: 0; display: flex;
    }
    .pw-toggle:hover { color: var(--text); }

    .forgot-row { text-align: right; margin-bottom: 20px; }
    .forgot-link { font-size: 13px; color: var(--sub); text-decoration: none; }
    .forgot-link:hover { color: #f97316; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; background: #f97316; color: #fff; font-weight: 600;
      font-size: 15px; border: none; border-radius: 10px; padding: 13px;
      cursor: pointer; transition: opacity 0.15s; font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-social {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; font-size: 14px; font-weight: 500; color: var(--text);
      cursor: pointer; transition: background 0.15s; width: 100%; font-family: inherit;
    }
    .btn-social:hover { opacity: 0.8; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--sub); font-size: 13px; margin: 24px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Social stack ── */
    .social-stack { display: flex; flex-direction: column; gap: 10px; }

    /* ── Footer ── */
    .footer-text { text-align: center; font-size: 14px; color: var(--sub); margin-top: 28px; }
    .footer-link { color: #f97316; text-decoration: none; font-weight: 500; margin-left: 4px; }

    /* ── Error ── */
    .error-msg { font-size: 13px; color: #ef4444; min-height: 18px; margin-bottom: 12px; }
  </style>
</head>

<body>

  <!-- Animated background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Logo top-left -->
  <div class="logo-bar">
    <a href="/" class="logo-link">
      <span class="logo-text">
        <span class="logo-pree">Pree</span><span class="logo-code">code</span>
      </span>
    </a>
  </div>

  <!-- Page -->
  <div class="page">
    <div class="card">

      <h1 class="card-heading">Sign in</h1>
      <p class="card-sub">to continue to Preecode</p>

      <form id="loginForm" novalidate>
        <div class="field-wrap">
          <input type="email" id="email" name="email" placeholder="Email" required
            autocomplete="email" aria-describedby="errorMsg" class="auth-field" />
        </div>

        <div class="field-wrap-pw">
          <input type="password" id="password" name="password" placeholder="Password" required
            autocomplete="current-password" aria-describedby="errorMsg" class="auth-field auth-field-pw" />
          <button type="button" class="pw-toggle" aria-label="Toggle password visibility" tabindex="-1">
            <svg class="pw-eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg class="pw-eye-closed hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
          </button>
        </div>

        <div class="forgot-row">
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <div id="errorMsg" class="error-msg" role="alert" aria-live="polite"></div>

        <button type="submit" id="loginBtn" class="btn-primary">
          <span id="btnText">Sign In</span>
          <svg id="btnSpinner" class="hidden animate-spin mx-auto h-5 w-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>

      <div class="divider">or</div>

      <div class="social-stack">
        <button type="button" id="googleLoginBtn" class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <button type="button" id="githubLoginBtn" class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          Continue with GitHub
        </button>

      <p class="footer-text">
        Don't have an account?
        <a href="register.html" class="footer-link">Create one</a>
      </p>

    </div>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>

  <!-- Server wake-up overlay -->
  <div id="serverWakeOverlay" style="display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px;">
    <style>@keyframes pc-spin{to{transform:rotate(360deg)}}</style>
    <div style="width:28px;height:28px;border:2.5px solid #2c2c2e;border-top-color:#f97316;border-radius:50%;animation:pc-spin 0.75s linear infinite;"></div>
    <p style="font-size:14px;color:#636366;font-family:Inter,system-ui,sans-serif;margin:0;">Connecting...</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Google
      var googleBtn = document.getElementById("googleLoginBtn");
      if (googleBtn) {
        googleBtn.addEventListener("click", function () {
          var overlay = document.getElementById('serverWakeOverlay');
          if (overlay) overlay.style.display = 'flex';
          var redirected = false;
          function doRedirect() {
            if (redirected) return;
            redirected = true;
            window.location.href = API_BASE + '/auth/google';
          }
          var fallback = setTimeout(doRedirect, 10000);
          fetch(API_BASE + '/health')
            .then(function () { clearTimeout(fallback); doRedirect(); })
            .catch(function () { clearTimeout(fallback); doRedirect(); });
        });
      }

      // GitHub
      var githubBtn = document.getElementById("githubLoginBtn");
      if (githubBtn) {
        githubBtn.addEventListener("click", function () {
          var overlay = document.getElementById('serverWakeOverlay');
          if (overlay) overlay.style.display = 'flex';
          var redirected = false;
          function doRedirect() {
            if (redirected) return;
            redirected = true;
            window.location.href = API_BASE + '/auth/github';
          }
          var fallback = setTimeout(doRedirect, 10000);
          fetch(API_BASE + '/health')
            .then(function () { clearTimeout(fallback); doRedirect(); })
            .catch(function () { clearTimeout(fallback); doRedirect(); });
        });
      }
    });
  </script>

</body>
</html>
